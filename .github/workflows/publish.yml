name: Publish Docker Image

on:
  push:
    branches:
      - main
      - feat/use-musl-for-ci
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker-publish:
    name: Build with Nix and push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Build Docker image with Nix
        run: nix build .#docker -L

      - name: Load Docker image tar
        run: docker load < result

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push image tags
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then
            docker tag livekit-monitor:latest jossephus/livekit-monitor:latest
            docker tag livekit-monitor:latest jossephus/livekit-monitor:${REF_NAME}
            docker push jossephus/livekit-monitor:latest
            docker push jossephus/livekit-monitor:${REF_NAME}
          elif [ "$REF_NAME" = "main" ]; then
            docker tag livekit-monitor:latest jossephus/livekit-monitor:latest
            docker tag livekit-monitor:latest jossephus/livekit-monitor:main-${GIT_SHA}
            docker push jossephus/livekit-monitor:latest
            docker push jossephus/livekit-monitor:main-${GIT_SHA}
          else
            docker tag livekit-monitor:latest jossephus/livekit-monitor:musl-ci-${GIT_SHA}
            docker push jossephus/livekit-monitor:musl-ci-${GIT_SHA}
          fi
