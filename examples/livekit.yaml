port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  udp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false

redis:
  address: redis:6379

keys:
  devkey: secret

webhook:
  api_key: devkey
  urls:
    - http://host.docker.internal:3001/api/webhook

ingress:
  rtmp_base_url: "rtmp://localhost:1935/live"

logging:
  level: info
