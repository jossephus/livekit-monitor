services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    depends_on:
      - redis
    command: --config /etc/livekit/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/livekit-egress;
      mc anonymous set download local/livekit-egress;
      exit 0;
      "

  egress:
    image: livekit/egress:latest
    restart: unless-stopped
    depends_on:
      - redis
      - livekit
      - minio
    environment:
      EGRESS_CONFIG_FILE: /etc/egress/egress.yaml
    volumes:
      - ./egress.yaml:/etc/egress/egress.yaml:ro
      - ./recordings:/out

  ingress:
    image: livekit/ingress:latest
    restart: unless-stopped
    depends_on:
      - redis
      - livekit
    environment:
      INGRESS_CONFIG_FILE: /etc/ingress/ingress.yaml
    ports:
      - "1935:1935"
      - "8080:8080"
    volumes:
      - ./ingress.yaml:/etc/ingress/ingress.yaml:ro

  monitor:
    image: jossephus/livekit-monitor:v0.1.2-beta
    restart: unless-stopped
    depends_on:
      - livekit
    environment:
      LIVEKIT_URL: http://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      PORT: "3001"
      SQLITE_PATH: /data/monitor.db
      RUST_LOG: info
    ports:
      - "3001:3001"
    volumes:
      - monitor_data:/data

volumes:
  minio_data:
  monitor_data:
